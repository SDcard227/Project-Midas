<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIDAS — The Pit</title>
  <script src="midas-theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#f5f0e8; --surface:#ede8dd; --card:#fff; --border:#ddd8ce; --border2:#c4bdb0;
      --text:#1e1a14; --mid:#5c5045; --dim:#9a9088;
      --green:#2d7a4f; --teal:#1a7080; --amber:#9a7018; --red:#8a3030;
      --mono:'Share Tech Mono','Courier New',monospace; --title:'Outfit',sans-serif;
      --shadow:0 1px 3px rgba(30,26,20,.07),0 4px 16px rgba(30,26,20,.05);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--title);background:var(--bg);color:var(--text);line-height:1.6}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;
      justify-content:space-between;padding:0 48px;height:60px;
      background:rgba(245,240,232,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
    .nav-logo{font-size:1.05rem;font-weight:600;text-decoration:none;letter-spacing:.08em;color:var(--text)}
    .nav-logo span{color:var(--amber)}
    .nav-links{display:flex;gap:24px;list-style:none}
    .nav-links a{color:var(--dim);text-decoration:none;font-size:.82rem;letter-spacing:.04em}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}
    .nav-cta{color:var(--green)!important;border:1px solid var(--green);padding:6px 16px;border-radius:2px}
    .nav-burger{display:none;background:none;border:none;font-size:1.6rem;line-height:1;color:var(--text);cursor:pointer;padding:0 6px;z-index:300;}

    .wrap{max-width:1100px;margin:0 auto;padding:90px 24px 30px}
    .badge{display:inline-block;font-family:var(--mono);font-size:.62rem;letter-spacing:.16em;
      text-transform:uppercase;color:var(--amber);border:1px solid var(--amber);padding:3px 10px;border-radius:2px;margin-bottom:12px}
    h1{font-size:clamp(2rem,5vw,2.8rem);font-weight:600;margin-bottom:4px}
    h1 span{color:var(--amber);font-weight:300}
    .sub{color:var(--mid);font-weight:300;margin-bottom:18px}

    .pit{display:grid;grid-template-columns:300px 1fr;gap:18px;height:72vh;min-height:460px}
    @media(max-width:760px){.pit{grid-template-columns:1fr;height:auto}.chat{height:64vh}}

    .rooms{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
    .rooms-h{padding:12px 16px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;color:var(--dim);text-transform:uppercase}
    .rlist{flex:1;overflow-y:auto}
    .room{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
    .room:hover{background:var(--surface)}
    .room.active{background:var(--surface);border-left:3px solid var(--green)}
    .room-name{font-weight:600;font-size:.92rem}
    .room-topic{font-size:.74rem;color:var(--dim);margin-top:1px;line-height:1.35}
    .room-meta{font-family:var(--mono);font-size:.58rem;color:var(--dim);margin-top:4px}
    .new-room{padding:12px 16px;border-top:1px solid var(--border);background:var(--surface)}
    .new-room input{width:100%;font-family:var(--title);font-size:.84rem;border:1px solid var(--border2);background:var(--bg);padding:7px 10px;outline:none;color:var(--text);margin-bottom:6px}
    .new-room button{width:100%;font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;background:var(--text);color:var(--bg);border:none;padding:8px;cursor:pointer;border-radius:2px}

    .chat{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
    .chat-h{padding:13px 18px;border-bottom:1px solid var(--border)}
    .chat-h .cn{font-weight:600;font-size:1rem}
    .chat-h .ct{font-size:.75rem;color:var(--dim)}
    .msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:11px}
    .msg .ma{font-family:var(--mono);font-size:.66rem;font-weight:600}
    .msg .mt{font-size:.9rem;color:var(--text);line-height:1.45;word-wrap:break-word}
    .msg .mtime{font-family:var(--mono);font-size:.54rem;color:var(--dim);margin-left:6px}
    .msg .mt a{color:var(--teal);text-decoration:none;font-family:var(--mono);font-weight:600}
    .composer{border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px}
    .composer input{flex:1;font-family:var(--title);font-size:.92rem;border:1px solid var(--border2);background:var(--bg);padding:10px 13px;outline:none;color:var(--text)}
    .composer button{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;background:var(--green);color:#fff;border:none;padding:0 20px;cursor:pointer;border-radius:2px}
    .composer button:disabled{opacity:.5}
    .muted{font-family:var(--mono);font-size:.78rem;color:var(--dim);text-align:center;padding:24px}
    .login-row{border-top:1px solid var(--border);padding:14px 16px;font-family:var(--mono);font-size:.76rem;color:var(--mid);text-align:center}
    .login-row a{color:var(--teal)}
    .plays{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
    .plays:empty{display:none}
    .pl-label{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-right:2px}
    .play-chip{font-family:var(--mono);font-size:.66rem;background:var(--card);border:1px solid var(--border2);padding:3px 8px;border-radius:2px;display:inline-flex;align-items:center;gap:5px}
    .play-chip a{color:var(--teal);text-decoration:none;font-weight:600}
    .play-chip .x{color:var(--dim);cursor:pointer}
    .play-chip .x:hover{color:var(--red)}
    .play-add{font-family:var(--mono);font-size:.62rem;background:transparent;border:1px dashed var(--border2);color:var(--mid);padding:3px 8px;cursor:pointer;border-radius:2px}
    .play-add:hover{border-color:var(--text);color:var(--text)}
  </style>
</head>
<body>
  <a id="midas-back" href="index.html" onclick="return midasBack(event)" style="position:fixed;top:72px;left:16px;z-index:150;font-family:var(--mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(245,240,232,.92);border:1px solid var(--border2);color:var(--mid);padding:5px 11px;border-radius:3px;text-decoration:none">&larr; Back</a>
  <script>function midasBack(e){if(history.length>1){e.preventDefault();history.back();return false;}return true;}</script>
  <nav>
    <a class="nav-logo" href="index.html">PROJECT <span>MIDAS</span></a>
    <ul class="nav-links">
      <li><a href="intelligence.html">Signals</a></li>
      <li><a href="whispers.html">The Wire</a></li>
      <li><a href="gossip.html">The Floor</a></li>
      <li><a href="pit.html" class="active">The Pit</a></li>
      <li><a href="practice.html">Replay</a></li>
      <li><a href="account.html" class="nav-cta">Account</a></li>
    </ul>
    <button class="nav-burger" aria-label="Menu" onclick="document.querySelector('nav .nav-links').classList.toggle('open')">&#9776;</button>
  </nav>

  <div class="wrap">
    <span class="badge">Community · Live rooms</span>
    <h1>THE <span>PIT</span></h1>
    <p class="sub">Where the floor gets loud. Drop into a room to talk setups, news, and group plays in real time.</p>

    <div class="pit">
      <div class="rooms">
        <div class="rooms-h">Rooms</div>
        <div class="rlist" id="rlist"><div class="muted">loading…</div></div>
        <div class="new-room" id="new-room" style="display:none">
          <input id="nr-name" maxlength="60" placeholder="New room name">
          <input id="nr-topic" maxlength="140" placeholder="Topic (optional)">
          <button onclick="createRoom()">Create room</button>
        </div>
      </div>

      <div class="chat">
        <div class="chat-h" id="chat-h"><span class="cn">Pick a room</span></div>
        <div class="plays" id="plays"></div>
        <div class="msgs" id="msgs"><div class="muted">Choose a room on the left to jump in.</div></div>
        <div id="composer-wrap"></div>
      </div>
    </div>
  </div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let ME=null, ROOMS=[], ACTIVE=null, LAST=0, POLL=null;

function linkify(t){
  return esc(t)
    .replace(/\$([A-Za-z]{1,5})\b/g,(m,s)=>'<a href="whispers.html?q='+s.toUpperCase()+'">$'+s.toUpperCase()+'</a>')
    .replace(/@([A-Za-z0-9_]{2,20})\b/g,(m,h)=>'<a class="mention" href="profile.html?h='+h.toLowerCase()+'">@'+h+'</a>');
}
function timeAgo(iso){
  try{ const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
    if(s<60)return 'now'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d';
  }catch(e){ return ''; }
}
async function loadRooms(){
  try{
    const d=await (await fetch('/api/rooms')).json();
    ROOMS=d.rooms||[];
    $('rlist').innerHTML=ROOMS.map(r=>
      '<div class="room'+(ACTIVE&&ACTIVE.id===r.id?' active':'')+'" onclick="openRoom('+r.id+')">'+
      '<div class="room-name">'+esc(r.name)+'</div>'+
      (r.topic?'<div class="room-topic">'+esc(r.topic)+'</div>':'')+
      '<div class="room-meta">'+(r.msg_count||0)+' message'+(r.msg_count===1?'':'s')+'</div></div>'
    ).join('')||'<div class="muted">No rooms yet.</div>';
  }catch(e){ $('rlist').innerHTML='<div class="muted">Server not reachable.</div>'; }
}
function renderComposer(){
  const w=$('composer-wrap');
  if(!ACTIVE){ w.innerHTML=''; return; }
  if(ME){
    w.innerHTML='<div class="composer"><input id="msg-in" maxlength="600" placeholder="Message #'+esc(ACTIVE.name)+'" onkeydown="if(event.key===\'Enter\')send()"><button id="msg-send" onclick="send()">Send</button></div>';
  } else {
    w.innerHTML='<div class="login-row"><a href="account.html">Make a free account</a> to join the conversation. Reading is open to everyone.</div>';
  }
}
async function openRoom(id){
  ACTIVE=ROOMS.find(r=>r.id===id); if(!ACTIVE) return;
  LAST=0;
  $('chat-h').innerHTML='<span class="cn">'+esc(ACTIVE.name)+'</span>'+(ACTIVE.topic?' <span class="ct">· '+esc(ACTIVE.topic)+'</span>':'');
  $('msgs').innerHTML='<div class="muted">loading…</div>';
  document.querySelectorAll('.room').forEach(el=>el.classList.remove('active'));
  loadRooms(); renderComposer(); loadPlays();
  await poll(true);
  if(POLL) clearInterval(POLL);
  POLL=setInterval(()=>poll(false), 4000);
}
async function poll(initial){
  if(!ACTIVE) return;
  try{
    const d=await (await fetch('/api/rooms/'+ACTIVE.id+'/messages?after='+LAST)).json();
    const msgs=d.messages||[];
    if(initial) $('msgs').innerHTML='';
    if(initial && !msgs.length){ $('msgs').innerHTML='<div class="muted">No messages yet. Be the first to say something.</div>'; }
    const box=$('msgs');
    const nearBottom = box.scrollHeight-box.scrollTop-box.clientHeight < 80;
    msgs.forEach(m=>{
      if(initial && box.querySelector('.muted')) box.innerHTML='';
      const hue=(m.rep&&m.rep.hue)||'var(--text)';
      const el=document.createElement('div'); el.className='msg';
      el.innerHTML='<span class="ma" style="color:'+hue+';cursor:pointer" onclick="openProfileSafe('+(m.user_id||0)+')">'+esc(m.author)+'</span>'+
        '<span class="mtime">'+timeAgo(m.created_at)+'</span>'+
        '<div class="mt">'+linkify(m.text)+'</div>';
      box.appendChild(el);
    });
    if(msgs.length){ LAST=d.last_id||LAST; if(initial||nearBottom) box.scrollTop=box.scrollHeight; }
  }catch(e){}
}
function openProfileSafe(uid){ if(uid) location.href='profile.html?u='+uid; }
async function loadPlays(){
  if(!ACTIVE){ $('plays').innerHTML=''; return; }
  try{
    const d=await (await fetch('/api/rooms/'+ACTIVE.id+'/plays')).json();
    const plays=d.plays||[];
    let h=plays.length?'<span class="pl-label">Room watchlist</span>':'';
    h+=plays.map(p=>'<span class="play-chip"><a href="company.html?ticker='+esc(p.ticker)+'">$'+esc(p.ticker)+'</a>'+
      (ME?'<span class="x" onclick="removePlay('+p.id+')">&times;</span>':'')+'</span>').join('');
    if(ME) h+='<button class="play-add" onclick="addPlay()">+ ticker</button>';
    $('plays').innerHTML=h;
  }catch(e){}
}
async function addPlay(){
  const t=prompt('Add a ticker to the room watchlist (e.g. NVDA):'); if(!t) return;
  try{
    const r=await (await fetch('/api/rooms/'+ACTIVE.id+'/plays',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticker:t})})).json();
    if(r.error){ if(window.midasToast) midasToast(r.error,'error'); return; }
    loadPlays();
  }catch(e){}
}
async function removePlay(id){
  try{ await fetch('/api/rooms/'+ACTIVE.id+'/plays/'+id,{method:'DELETE'}); loadPlays(); }catch(e){}
}
async function send(){
  const inp=$('msg-in'); const text=(inp.value||'').trim(); if(!text) return;
  const btn=$('msg-send'); btn.disabled=true;
  try{
    const r=await (await fetch('/api/rooms/'+ACTIVE.id+'/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})})).json();
    if(r.error){ if(window.midasToast) midasToast(r.error,'error'); btn.disabled=false; return; }
    inp.value=''; await poll(false);
  }catch(e){ if(window.midasToast) midasToast('Could not send.','error'); }
  btn.disabled=false; inp.focus();
}
async function createRoom(){
  const name=$('nr-name').value.trim(), topic=$('nr-topic').value.trim();
  if(!name){ if(window.midasToast) midasToast('Name your room.','error'); return; }
  try{
    const r=await (await fetch('/api/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,topic})})).json();
    if(r.error){ if(window.midasToast) midasToast(r.error,'error'); return; }
    $('nr-name').value=''; $('nr-topic').value='';
    await loadRooms(); openRoom(r.id);
  }catch(e){ if(window.midasToast) midasToast('Could not create room.','error'); }
}
(async()=>{
  try{ ME=(await (await fetch('/api/me')).json()).user; }catch(e){}
  if(ME) $('new-room').style.display='block';
  await loadRooms();
  if(ROOMS.length) openRoom(ROOMS[0].id);
})();
</script>
</body>
</html>
